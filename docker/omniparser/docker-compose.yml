services:
  omniparser:
    build: .
    ports:
      - "8080:8080"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      # OMNIPARSER_YOLO_MODEL is set in the Dockerfile to the pre-downloaded
      # local path (/app/weights/icon_detect.pt). Override only if mounting
      # alternate weights.
      - OMNIPARSER_CAPTION_MODEL=microsoft/Florence-2-base
    volumes:
      # Persist HuggingFace and EasyOCR model caches across rebuilds
      - omniparser-hf-cache:/root/.cache/huggingface
      - omniparser-easyocr-cache:/root/.EasyOCR

  # CPU-only variant (slower but works without GPU)
  # Start with: docker compose --profile cpu up
  omniparser-cpu:
    build: .
    ports:
      - "8081:8080"
    environment:
      - OMNIPARSER_CAPTION_MODEL=microsoft/Florence-2-base
      - CUDA_VISIBLE_DEVICES=  # Force CPU mode
    volumes:
      - omniparser-hf-cache:/root/.cache/huggingface
      - omniparser-easyocr-cache:/root/.EasyOCR
    profiles:
      - cpu

volumes:
  omniparser-hf-cache:
  omniparser-easyocr-cache:
