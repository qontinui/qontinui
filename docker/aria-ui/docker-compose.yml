services:
  # Standalone AriaUI — use when NOT using llama-swap.
  # Start with: docker compose --profile standalone up
  # For GPU-shared multi-model setup, use docker/llama-swap/ instead.
  aria-ui:
    build: .
    ports:
      - "8100:8100"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - HF_HOME=/root/.cache/huggingface
    volumes:
      - aria-ui-cache:/root/.cache/huggingface
    profiles:
      - standalone

  # Context-aware variant — uses action history for disambiguation.
  # Requires Aria-UI-context-aware weights (add to Dockerfile).
  # Start with: docker compose --profile context up
  aria-ui-context:
    build: .
    ports:
      - "8101:8100"
    command: ["python3", "/opt/serve.py", "--model", "Aria-UI/Aria-UI-context-aware", "--host", "0.0.0.0", "--port", "8100"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - HF_HOME=/root/.cache/huggingface
    volumes:
      - aria-ui-cache:/root/.cache/huggingface
    profiles:
      - context

volumes:
  aria-ui-cache:
